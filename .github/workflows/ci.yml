name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle

      - name: Run backend tests
        run: ./gradlew test -x webapp --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: testcontainers
          GOOGLE_CLIENT_ID: ''
          GOOGLE_CLIENT_SECRET: ''

  frontend:
    name: Frontend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Frontend tests
        run: npm run ci:frontend:test

      - name: Build webapp
        run: npm run webapp:build:prod
