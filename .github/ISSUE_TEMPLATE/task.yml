name: Technical Task
description: Backend, frontend, infrastructure, or integration task
title: "[E?] task: "
labels: ["task"]
body:
  - type: textarea
    id: task
    attributes:
      label: Task
      description: Describe the technical change.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      value: |
        - [ ] ...
    validations:
      required: true
  - type: input
    id: spec
    attributes:
      label: Spec Path
      placeholder: docs/specs/eN-feature-name/NN-issue-name.md
  - type: textarea
    id: verification
    attributes:
      label: Verification
      value: |
        - [ ] Backend tests
        - [ ] Frontend tests/build
        - [ ] Manual check
